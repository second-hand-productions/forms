name: Build and deploy

# The self-hosted runner lives on the same Ubuntu box we deploy to, so the
# image is built and run locally — no registry push or SSH step involved.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag or SHA to deploy"
        required: false
        default: main

concurrency:
  group: deploy-forms
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          # Manual runs deploy the requested ref; pushes deploy the pushed commit.
          ref: ${{ github.event.inputs.ref || github.sha }}

      - name: Build and deploy
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          IMAGE_TAG: ${{ github.sha }}
          HOST_PORT: "8080"
        run: |
          chmod +x deploy/deploy.sh
          ./deploy/deploy.sh

      - name: Install nginx vhost
        # Skips cleanly until the one-time server setup in deploy/README.md is
        # done, so the app deploy above works with or without it.
        run: |
          if [ -x /usr/local/sbin/deploy-forms-nginx.sh ]; then
            sudo /usr/local/sbin/deploy-forms-nginx.sh "$PWD/deploy/forms.nginx.conf"
          else
            echo "deploy-forms-nginx.sh not installed — skipping vhost install."
            echo "See deploy/README.md for the one-time setup."
          fi

      - name: Prune old images
        if: always()
        run: docker image prune -f
