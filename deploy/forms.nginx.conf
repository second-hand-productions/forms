# Managed by the forms deploy pipeline.
# Installed to /etc/nginx/apps.d/forms.conf and included by the shared root
# vhost — this file is a fragment, not a full server block.
# Edits made directly on the server will be overwritten on the next deploy.
#
# The app runs in Docker on 127.0.0.1:8080. The /forms prefix is deliberately
# NOT stripped here (no trailing slash on proxy_pass): ASP.NET strips it via
# app.UsePathBase, so /forms/api/... and the SPA's /forms/assets/... line up.
location /forms/ {
    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /forms;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
}

location = /forms {
    return 308 /forms/;
}
