# Managed by the forms deploy pipeline.
# Edits made directly on the server will be overwritten on the next deploy.
#
# The app itself runs in Docker bound to 127.0.0.1:8080; nginx owns the
# public name so the port never has to appear in a URL.
server {
    listen 80;
    listen [::]:80;
    server_name forms.lan;

    # ASP.NET serves both the API and the built Vue SPA (including its
    # client-side route fallback), so the whole origin proxies as one unit.
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
